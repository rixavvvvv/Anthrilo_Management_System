services:
  redis:
    image: redis:7-alpine
    container_name: anthrilo_redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anthrilo_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anthrilo_backend
    ports:
      - "${BACKEND_BIND:-8000:8000}"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=${DEBUG:-False}
      - RUN_MIGRATIONS_ON_STARTUP=${RUN_MIGRATIONS_ON_STARTUP:-true}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - anthrilo_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://127.0.0.1:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
    container_name: anthrilo_frontend
    ports:
      - "${FRONTEND_BIND:-3000:3000}"
    env_file:
      - ./frontend/.env.local
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - anthrilo_net

volumes:
  redis_data:

networks:
  anthrilo_net:
    driver: bridge
